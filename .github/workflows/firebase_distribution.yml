# iOS / Android アプリをビルドして Firebase App Distribution で配布するワークフロー。
#
# 手動実行 (workflow_dispatch) で起動します。
# platform 入力で ios / android / both を選択できます。
#
# ============================================================================
# 事前に GitHub リポジトリの Settings > Secrets and variables > Actions に
# 以下の Secret を登録してください。(バイナリ系はすべて base64 エンコード)
# ============================================================================
#
# 【共通: dart-define】
#   PRODUCTION_ENV
#     - dart_defines/production.env を base64 エンコードした文字列
#       生成例: base64 -i dart_defines/production.env | pbcopy
#   DEVELOPMENT_ENV
#     - dart_defines/development.env を base64 エンコードした文字列
#       生成例: base64 -i dart_defines/development.env | pbcopy
#     ※ workflow_dispatch の入力 flavor で production / development を切り替えます。
#
# 【共通: Firebase】
#   FIREBASE_SERVICE_ACCOUNT
#     - Firebase App Distribution 権限を持つサービスアカウント鍵 (JSON) の中身
#       ロール例: Firebase App Distribution Admin
#
# 【iOS】
#   FIREBASE_IOS_APP_ID
#     - Firebase コンソールの iOS アプリの App ID (例: 1:1234567890:ios:abcdef...)
#   IOS_DIST_CERTIFICATE_BASE64
#     - 配布用証明書 (.p12) を base64 エンコードした文字列
#       生成例: base64 -i Certificates.p12 | pbcopy
#   IOS_DIST_CERTIFICATE_PASSWORD
#     - 上記 .p12 のパスワード
#   IOS_PROVISIONING_PROFILE_BASE64
#     - 配布用プロビジョニングプロファイル (.mobileprovision) を base64 化したもの
#       生成例: base64 -i profile.mobileprovision | pbcopy
#       ※ Firebase App Distribution で配布するため ad-hoc もしくは development の
#         プロファイルを使用してください (app-store プロファイルは実機直接インストール不可)。
#   KEYCHAIN_PASSWORD
#     - CI 上に作成する一時キーチェーンのパスワード (任意の文字列)
#   GOOGLE_SERVICE_INFO_PLIST_PRODUCTION
#     - production 用 GoogleService-Info.plist を base64 化した文字列
#       生成例: base64 -i ios/production/GoogleService-Info.plist | pbcopy
#   GOOGLE_SERVICE_INFO_PLIST_DEVELOPMENT
#     - development 用 GoogleService-Info.plist を base64 化した文字列
#       生成例: base64 -i ios/development/GoogleService-Info.plist | pbcopy
#     ※ Xcode のビルドフェーズで ios/<flavor>/GoogleService-Info.plist を
#       Runner にコピーして同梱するため、iOS ビルドにも plist が必要です。
#
# 【Android】
#   FIREBASE_ANDROID_APP_ID
#     - Firebase コンソールの Android アプリの App ID (例: 1:1234567890:android:abcdef...)
#   ANDROID_KEYSTORE_BASE64
#     - リリース署名用キーストア (.jks/.keystore) を base64 化した文字列
#       生成例: base64 -i upload-keystore.jks | pbcopy
#   ANDROID_KEYSTORE_PASSWORD
#     - キーストアのパスワード (key.properties の releaseStorePassword)
#   ANDROID_KEY_ALIAS
#     - キーエイリアス (key.properties の releaseKeyAlias)
#   ANDROID_KEY_PASSWORD
#     - キーのパスワード (key.properties の releaseKeyPassword)
#   GOOGLE_SERVICES_JSON_PRODUCTION
#     - production 用 google-services.json を base64 化した文字列
#   GOOGLE_SERVICES_JSON_DEVELOPMENT
#     - development 用 google-services.json を base64 化した文字列
# ============================================================================

name: iOS / Android Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '配布対象のプラットフォーム'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ios
          - android
      flavor:
        description: 'ビルドするフレーバー (使用する dart-define を切り替え)'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
      flutter_version:
        description: 'Flutter のバージョン (pubspec の Dart ^3.7.2 に対応)'
        required: true
        default: '3.29.2'
      export_method:
        description: '[iOS] IPA のエクスポート方式'
        required: true
        default: 'ad-hoc'
        type: choice
        options:
          - ad-hoc
          - development
          - app-store
      tester_groups:
        description: 'Firebase App Distribution の配布先テスターグループ (カンマ区切り)'
        required: false
        default: 'testers'
      release_notes:
        description: '配布時のリリースノート'
        required: false
        default: 'workflow_dispatch による配布'

jobs:
  # ==========================================================================
  # iOS
  # ==========================================================================
  build-ios:
    name: Build & Distribute iOS
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Create dart-define env file
        env:
          FLAVOR: ${{ github.event.inputs.flavor }}
          PRODUCTION_ENV_BASE64: ${{ secrets.PRODUCTION_ENV }}
          DEVELOPMENT_ENV_BASE64: ${{ secrets.DEVELOPMENT_ENV }}
        run: |
          set -euo pipefail
          mkdir -p dart_defines
          if [ "$FLAVOR" = "development" ]; then
            ENV_FILE="dart_defines/development.env"
            echo "$DEVELOPMENT_ENV_BASE64" | base64 --decode > "$ENV_FILE"
          else
            ENV_FILE="dart_defines/production.env"
            echo "$PRODUCTION_ENV_BASE64" | base64 --decode > "$ENV_FILE"
          fi
          if [ ! -s "$ENV_FILE" ]; then
            echo "$ENV_FILE が空です。Secret が正しく登録されているか確認してください" >&2
            exit 1
          fi
          echo "ENV_FILE=$ENV_FILE" >> "$GITHUB_ENV"
          echo "使用する dart-define: $ENV_FILE"

      - name: Setup GoogleService-Info.plist
        env:
          FLAVOR: ${{ github.event.inputs.flavor }}
          PLIST_PRODUCTION: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PRODUCTION }}
          PLIST_DEVELOPMENT: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEVELOPMENT }}
        run: |
          set -euo pipefail
          # Xcode のビルドフェーズが ios/<flavor>/GoogleService-Info.plist を
          # ios/Runner/GoogleService-Info.plist にコピーして同梱する
          DEST_DIR="ios/${FLAVOR}"
          DEST="${DEST_DIR}/GoogleService-Info.plist"
          mkdir -p "$DEST_DIR"
          if [ "$FLAVOR" = "development" ]; then
            echo "$PLIST_DEVELOPMENT" | base64 --decode > "$DEST"
          else
            echo "$PLIST_PRODUCTION" | base64 --decode > "$DEST"
          fi
          if [ ! -s "$DEST" ]; then
            echo "$DEST が空です。Secret が正しく登録されているか確認してください" >&2
            exit 1
          fi
          echo "配置: $DEST"

      - name: Flutter pub get
        run: flutter pub get

      # 生成ファイル (*.g.dart / *.freezed.dart / *.realm.dart) はリポジトリに
      # コミット済みのため通常は不要です。モデル変更を CI 側で反映したい場合は
      # 下記コメントを解除してください。
      # - name: Run build_runner
      #   run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dist_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          # 一時キーチェーンを作成
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 証明書をインポート
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 検索対象キーチェーンに追加 (既存のものも維持)
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # プロファイルから必要な情報を抽出
          PLIST_PATH="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PLIST_PATH"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PLIST_PATH")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PLIST_PATH")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PLIST_PATH")
          APP_ID_FULL=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PLIST_PATH")
          # "TEAMID.com.example.app" から先頭のチームIDを取り除いた Bundle ID
          BUNDLE_ID="${APP_ID_FULL#*.}"

          # Xcode が参照する場所へインストール
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          cp "$PROFILE_PATH" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"
          echo "抽出結果: bundleId=$BUNDLE_ID / profile=$PROFILE_NAME / team=$TEAM_ID"

      - name: Generate ExportOptions.plist
        env:
          EXPORT_METHOD: ${{ github.event.inputs.export_method }}
        run: |
          set -euo pipefail
          if [ "$EXPORT_METHOD" = "development" ]; then
            SIGNING_CERT="Apple Development"
          else
            SIGNING_CERT="Apple Distribution"
          fi

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>${SIGNING_CERT}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "===== ExportOptions.plist ====="
          cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Build IPA (archive + export)
        run: |
          set -euo pipefail
          flutter build ipa \
            --release \
            --dart-define-from-file="$ENV_FILE" \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist"

      - name: Locate IPA
        id: ipa
        run: |
          set -euo pipefail
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "IPA が見つかりませんでした" >&2
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "生成された IPA: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.ipa.outputs.path }}
          if-no-files-found: error

      - name: Distribute to Firebase App Distribution (iOS)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ github.event.inputs.tester_groups }}
          releaseNotes: ${{ github.event.inputs.release_notes }}
          file: ${{ steps.ipa.outputs.path }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

  # ==========================================================================
  # Android
  # ==========================================================================
  build-android:
    name: Build & Distribute Android
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Create dart-define env file
        env:
          FLAVOR: ${{ github.event.inputs.flavor }}
          PRODUCTION_ENV_BASE64: ${{ secrets.PRODUCTION_ENV }}
          DEVELOPMENT_ENV_BASE64: ${{ secrets.DEVELOPMENT_ENV }}
        run: |
          set -euo pipefail
          mkdir -p dart_defines
          if [ "$FLAVOR" = "development" ]; then
            ENV_FILE="dart_defines/development.env"
            echo "$DEVELOPMENT_ENV_BASE64" | base64 --decode > "$ENV_FILE"
          else
            ENV_FILE="dart_defines/production.env"
            echo "$PRODUCTION_ENV_BASE64" | base64 --decode > "$ENV_FILE"
          fi
          if [ ! -s "$ENV_FILE" ]; then
            echo "$ENV_FILE が空です。Secret が正しく登録されているか確認してください" >&2
            exit 1
          fi
          echo "ENV_FILE=$ENV_FILE" >> "$GITHUB_ENV"
          echo "使用する dart-define: $ENV_FILE"

      - name: Setup google-services.json
        env:
          FLAVOR: ${{ github.event.inputs.flavor }}
          GOOGLE_SERVICES_JSON_PRODUCTION: ${{ secrets.GOOGLE_SERVICES_JSON_PRODUCTION }}
          GOOGLE_SERVICES_JSON_DEVELOPMENT: ${{ secrets.GOOGLE_SERVICES_JSON_DEVELOPMENT }}
        run: |
          set -euo pipefail
          DEST="android/app/src/${FLAVOR}/google-services.json"
          mkdir -p "android/app/src/${FLAVOR}"
          if [ "$FLAVOR" = "development" ]; then
            echo "$GOOGLE_SERVICES_JSON_DEVELOPMENT" | base64 --decode > "$DEST"
          else
            echo "$GOOGLE_SERVICES_JSON_PRODUCTION" | base64 --decode > "$DEST"
          fi
          if [ ! -s "$DEST" ]; then
            echo "$DEST が空です。Secret が正しく登録されているか確認してください" >&2
            exit 1
          fi
          echo "配置: $DEST"

      - name: Setup Android signing (keystore + key.properties)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          # storeFile は app モジュール (android/app) からの相対パスで解決される
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          cat > android/key.properties <<EOF
          releaseKeyAlias=${ANDROID_KEY_ALIAS}
          releaseKeyPassword=${ANDROID_KEY_PASSWORD}
          releaseStoreFile=release-keystore.jks
          releaseStorePassword=${ANDROID_KEYSTORE_PASSWORD}
          EOF
          echo "key.properties を生成しました"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --dart-define-from-file="$ENV_FILE"

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          APK_PATH=$(find build/app/outputs -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK が見つかりませんでした" >&2
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "生成された APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Distribute to Firebase App Distribution (Android)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ github.event.inputs.tester_groups }}
          releaseNotes: ${{ github.event.inputs.release_notes }}
          file: ${{ steps.apk.outputs.path }}
